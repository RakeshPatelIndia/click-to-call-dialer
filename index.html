<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<meta name="description" content="Click to Call via Twilio">
<title>📞 Dialer</title>
<link rel="manifest" href="manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0f1e;color:#e2e8f0;min-height:100dvh;min-height:-webkit-fill-available;display:flex;flex-direction:column;max-width:520px;margin:0 auto;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.header{padding:20px 16px 12px;text-align:center}
.header h1{font-size:1.1rem;font-weight:600;color:#f1f5f9;letter-spacing:-0.01em}
.header .tag{font-size:0.7rem;color:#475569;margin-top:2px}
.settings-row{display:flex;gap:8px;align-items:center;padding:0 16px 8px;justify-content:center;flex-wrap:wrap}
.settings-row input{padding:10px 12px;font-size:0.9rem;border:1.5px solid #1e293b;border-radius:10px;background:#111827;color:#e2e8f0;text-align:center;width:140px;outline:none;font-family:monospace}
.settings-row input:focus{border-color:#3b82f6}
.settings-row .pin{width:70px}
.settings-row button{padding:10px 14px;font-size:0.8rem;border:none;border-radius:10px;background:#1e293b;color:#94a3b8;cursor:pointer;font-weight:500}
.settings-row button:active{background:#334155}
.settings-row label{font-size:0.7rem;color:#64748b}
.dialer-area{flex:1;display:flex;flex-direction:column;padding:8px 16px 16px}
.display{background:#111827;border:1.5px solid #1e293b;border-radius:14px;padding:20px 16px;text-align:center;min-height:72px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.display .number{font-size:1.6rem;font-weight:500;font-family:'SF Mono','Fira Code',monospace;letter-spacing:0.03em;color:#f8fafc;word-break:break-all}
.display .placeholder{color:#334155;font-size:1rem}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
.key{aspect-ratio:1.4;border:none;border-radius:14px;background:#111827;color:#e2e8f0;font-size:1.4rem;font-weight:400;cursor:pointer;display:flex;align-items:center;justify-content:center;border:1.5px solid #1e293b;transition:all 0.1s}
.key:active{background:#1d4ed8;border-color:#3b82f6;transform:scale(0.96)}
.key.zero{grid-column:2}
.key.call{background:#16a34a;border-color:#16a34a;color:#fff;font-size:1.6rem}
.key.call:active{background:#15803d}
.key.del{background:transparent;border-color:transparent;color:#64748b;font-size:1rem}
.key.del:active{color:#f8fafc;background:#1e293b}
.status{text-align:center;font-size:0.8rem;min-height:24px;padding:4px 0;transition:all 0.3s}
.status.success{color:#22c55e}
.status.error{color:#ef4444}
.status.calling{color:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.sections{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.section{padding:8px 0}
.section-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.12em;color:#475569;padding:0 4px;margin-bottom:6px}
.contact-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#111827;border-radius:10px;margin-bottom:4px;border:1.5px solid #1e293b}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:0.9rem;font-weight:500}
.contact-number{font-size:0.75rem;color:#64748b;margin-top:1px}
.contact-call{background:#16a34a;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:0.8rem;cursor:pointer;font-weight:600;white-space:nowrap}
.contact-call:active{background:#15803d}
.contact-del{color:#475569;background:none;border:none;font-size:0.7rem;cursor:pointer;padding:4px}
.add-contact{padding:10px;text-align:center;color:#3b82f6;cursor:pointer;border:1px dashed #1e293b;border-radius:10px;font-size:0.85rem}
.add-contact:active{background:#111827}
.empty{color:#334155;text-align:center;padding:16px;font-size:0.8rem}
.footer{text-align:center;padding:12px;color:#1e293b;font-size:0.65rem;border-top:1px solid #0f172a}
.setup-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px}
.setup-screen h2{font-size:1rem;color:#94a3b8;font-weight:400}
.setup-screen input{padding:14px;font-size:1.1rem;border:2px solid #1e293b;border-radius:12px;background:#111827;color:#e2e8f0;text-align:center;width:100%;max-width:260px;outline:none;font-family:monospace}
.setup-screen input:focus{border-color:#3b82f6}
.setup-screen button{padding:14px 40px;font-size:1rem;border:none;border-radius:12px;background:#3b82f6;color:#fff;font-weight:600;cursor:pointer}
.setup-screen button:active{background:#2563eb}
.setup-screen .skip{color:#475569;font-size:0.8rem;cursor:pointer}
</style>
</head>
<body>

<!-- Setup screen (first visit) -->
<div id="setupScreen" class="setup-screen" style="display:none">
  <h2>📞 Enter your mobile number</h2>
  <p style="color:#64748b;font-size:0.8rem;text-align:center">Twilio will call this number<br>then connect to your destination</p>
  <input type="tel" id="setupMobile" placeholder="+614XXXXXXXX" autocomplete="tel">
  <button onclick="saveSetup()">Save &amp; Continue</button>
  <span class="skip" onclick="skipSetup()">I'll set it later</span>
</div>

<!-- Main dialer -->
<div id="mainApp" style="display:flex;flex-direction:column;flex:1">
  <div class="header">
    <h1>📞 Click to Call</h1>
    <div class="tag">via Twilio</div>
  </div>
  <div class="settings-row">
    <label>Your #:</label>
    <input type="tel" id="mobileInput" placeholder="+614XXXXXXXX" autocomplete="tel">
    <label>PIN:</label>
    <input type="password" class="pin" id="pinInput" maxlength="6" placeholder="0000" autocomplete="off">
  </div>
  <div class="dialer-area">
    <div class="display">
      <span class="number" id="display">+61</span>
      <span class="placeholder" id="placeholder"></span>
    </div>
    <div class="keypad">
      <button class="key" onclick="addDigit('1')">1</button>
      <button class="key" onclick="addDigit('2')">2</button>
      <button class="key" onclick="addDigit('3')">3</button>
      <button class="key" onclick="addDigit('4')">4</button>
      <button class="key" onclick="addDigit('5')">5</button>
      <button class="key" onclick="addDigit('6')">6</button>
      <button class="key" onclick="addDigit('7')">7</button>
      <button class="key" onclick="addDigit('8')">8</button>
      <button class="key" onclick="addDigit('9')">9</button>
      <button class="key" onclick="addDigit('*')">*</button>
      <button class="key zero" onclick="addDigit('0')">0</button>
      <button class="key" onclick="addDigit('#')">#</button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:10px">
      <button class="key del" style="flex:1" onclick="deleteDigit()">⌫</button>
      <button class="key call" style="flex:2;aspect-ratio:auto" id="callBtn" onclick="makeCall()">📞 CALL</button>
    </div>
    <div class="status" id="status"></div>
  </div>
  <div class="sections">
    <div class="section">
      <div class="section-title">⭐ Saved</div>
      <div id="contactsList"></div>
      <div class="add-contact" onclick="addContact()">+ Add Contact</div>
    </div>
    <div class="section">
      <div class="section-title">🕐 Recent</div>
      <div id="recentList"><div class="empty">No recent calls</div></div>
    </div>
  </div>
  <div class="footer">Calls made from your Twilio number</div>
</div>

<script>
// ===== CONFIG =====
const ACCOUNT_SID = 'ACf6d73ea3483cc85272a19faa8e01dc15';
const API_KEY = 'SKf01ec049898c76a4d0e21488a3134ece';
const API_SECRET = 'sDd2XCcWMaYDlmqj758yLY26ljmTTMTm';
const CALLER_ID = '+61468004468';

// ===== STATE =====
let enteredDigits = '+61';

// ===== SETUP =====
function init() {
  const mobile = localStorage.getItem('dialer_mobile');
  if (!mobile) {
    document.getElementById('setupScreen').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
  } else {
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'flex';
    document.getElementById('mobileInput').value = mobile;
    document.getElementById('pinInput').value = localStorage.getItem('dialer_pin') || '';
  }
  updateDisplay();
  renderContacts();
  renderRecent();
}

function saveSetup() {
  const mobile = document.getElementById('setupMobile').value.trim();
  if (!mobile || mobile.length < 6) { alert('Enter a valid mobile number'); return; }
  localStorage.setItem('dialer_mobile', mobile);
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  document.getElementById('mobileInput').value = mobile;
}

function skipSetup() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
}

// ===== KEYPAD =====
function addDigit(d) {
  if (enteredDigits === '+61') enteredDigits = '+61';
  enteredDigits += d;
  updateDisplay();
}

function deleteDigit() {
  if (enteredDigits.length > 3) {
    enteredDigits = enteredDigits.slice(0, -1);
  }
  if (enteredDigits === '+61' || enteredDigits === '') enteredDigits = '+61';
  updateDisplay();
}

function updateDisplay() {
  const displayEl = document.getElementById('display');
  const placeEl = document.getElementById('placeholder');
  if (enteredDigits === '+61') {
    displayEl.textContent = '+61';
    placeEl.textContent = '  4XX XXX XXX';
  } else {
    displayEl.textContent = enteredDigits;
    placeEl.textContent = '';
  }
  // Save mobile as you type
  if (enteredDigits.length > 5) {
    document.getElementById('mobileInput').value = enteredDigits;
    localStorage.setItem('dialer_mobile', enteredDigits);
  }
}

// ===== CALL =====
async function makeCall() {
  const destination = document.getElementById('display').textContent;
  const mobile = document.getElementById('mobileInput').value.trim() || localStorage.getItem('dialer_mobile');
  const pin = document.getElementById('pinInput').value || localStorage.getItem('dialer_pin');
  
  if (destination === '+61' || destination.length < 6) {
    setStatus('Enter a number first', 'error'); return;
  }
  if (!mobile || mobile.length < 6) {
    setStatus('Set your mobile number first', 'error');
    document.getElementById('setupScreen').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
    return;
  }
  
  // Save
  localStorage.setItem('dialer_mobile', mobile);
  if (pin) localStorage.setItem('dialer_pin', pin);
  
  const btn = document.getElementById('callBtn');
  btn.disabled = true;
  btn.textContent = '...';
  setStatus('Initiating call...', 'calling');
  
  const twiml = `<?xml version="1.0" encoding="UTF-8"?><Response><Say voice="alice">Connecting your call</Say><Dial callerId="${CALLER_ID}">${destination}</Dial></Response>`;
  
  const formBody = new URLSearchParams({
    To: mobile,
    From: CALLER_ID,
    Twiml: twiml
  });
  
  try {
    const resp = await fetch(`https://api.twilio.com/2010-04-01/Accounts/${ACCOUNT_SID}/Calls.json`, {
      method: 'POST',
      headers: {
        'Authorization': 'Basic ' + btoa(`${API_KEY}:${API_SECRET}`),
        'Content-Type': 'application/x-www-form-urlencoded'
      },
      body: formBody
    });
    const data = await resp.json();
    if (data.sid) {
      setStatus('✅ Answer your phone! Connecting...', 'success');
      addRecent(destination);
      renderRecent();
    } else {
      setStatus('❌ ' + (data.message || 'Failed. Check console.'), 'error');
      console.error('Twilio error:', data);
    }
  } catch(e) {
    setStatus('❌ Network error: ' + e.message, 'error');
    console.error(e);
  }
  
  btn.disabled = false;
  btn.textContent = '📞 CALL';
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (type || '');
}

// ===== CONTACTS =====
function getContacts() {
  try { return JSON.parse(localStorage.getItem('dialer_contacts')) || []; }
  catch(e) { return []; }
}

function saveContacts(contacts) {
  localStorage.setItem('dialer_contacts', JSON.stringify(contacts));
  renderContacts();
}

function renderContacts() {
  const container = document.getElementById('contactsList');
  const contacts = getContacts();
  if (contacts.length === 0) {
    container.innerHTML = '<div class="empty">No saved contacts</div>';
    return;
  }
  container.innerHTML = contacts.map((c, i) => `
    <div class="contact-item">
      <div class="contact-info" onclick="dialSaved('${escAttr(c.number)}')">
        <div class="contact-name">${esc(c.name)}</div>
        <div class="contact-number">${esc(c.number)}</div>
      </div>
      <button class="contact-call" onclick="event.stopPropagation();dialSaved('${escAttr(c.number)}')">📞</button>
      <button class="contact-del" onclick="event.stopPropagation();deleteContact(${i})">✕</button>
    </div>`).join('');
}

function renderRecent() {
  const container = document.getElementById('recentList');
  const recent = getRecent();
  if (recent.length === 0) {
    container.innerHTML = '<div class="empty">No recent calls</div>';
    return;
  }
  container.innerHTML = recent.map(r => {
    const d = new Date(r.time);
    const ts = d.toLocaleString('en-AU', {hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'});
    return `<div class="contact-item" onclick="dialSaved('${escAttr(r.number)}')">
      <div class="contact-info">
        <div class="contact-name">${esc(r.number)}</div>
        <div class="contact-number">${ts}</div>
      </div>
      <button class="contact-call" onclick="event.stopPropagation();dialSaved('${escAttr(r.number)}')">📞</button>
    </div>`;
  }).join('');
}

function getRecent() {
  try { return JSON.parse(localStorage.getItem('dialer_recent')) || []; }
  catch(e) { return []; }
}

function addRecent(num) {
  let recent = getRecent().filter(r => r.number !== num);
  recent.unshift({ number: num, time: Date.now() });
  if (recent.length > 10) recent = recent.slice(0, 10);
  localStorage.setItem('dialer_recent', JSON.stringify(recent));
}

function dialSaved(num) {
  enteredDigits = num;
  updateDisplay();
  makeCall();
}

function addContact() {
  const name = prompt('Contact name:');
  if (!name) return;
  const num = prompt('Phone number (with country code):', '+61');
  if (!num) return;
  const contacts = getContacts();
  contacts.push({ name, number: num });
  contacts.sort((a,b) => a.name.localeCompare(b.name));
  saveContacts(contacts);
}

function deleteContact(i) {
  if (!confirm('Delete this contact?')) return;
  const contacts = getContacts();
  contacts.splice(i, 1);
  saveContacts(contacts);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '\\"');
}

// ===== INIT =====
init();

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
